<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRIVIUM 369 | Aula</title>

    <link rel="stylesheet" href="../../style-main.css" />

    <style>
      .aula-container {
        max-width: 800px;
        margin: 40px auto;
        padding: 20px;
        background-color: var(--cor-secundaria);
        border-radius: 8px;
        border-left: 5px solid var(--cor-destaque);
      }
      .aula-header {
        text-align: center;
        margin-bottom: 40px;
        padding-bottom: 20px;
        border-bottom: 1px solid #333;
      }
      .aula-header h1 {
        font-size: 2.5em;
        margin-bottom: 10px;
      }
      .aula-header h3 {
        font-size: 1.2em;
        font-weight: normal;
        color: var(--cor-texto);
      }
      .aula-content {
        text-align: left;
      }
      .aula-content h2 {
        font-size: 1.8em;
        color: var(--cor-destaque);
        margin-top: 40px;
      }
      .aula-content p,
      .aula-content li {
        font-size: 1.15em;
        line-height: 1.7;
      }
      .navegacao-aula {
        display: flex;
        justify-content: space-between;
        margin-top: 50px;
        padding-top: 20px;
        border-top: 1px solid #333;
      }
      .navegacao-aula a {
        color: var(--cor-destaque);
        text-decoration: none;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <main class="aula-container">
      <header class="aula-header">
        <h3>MÓDULO X: NOME DO MÓDULO</h3>
        <h1>Título da Aula</h1>
      </header>

      <article class="aula-content">
        <h2>Seção 1: Título da Seção</h2>
        <p>Este é um parágrafo de exemplo do conteúdo da aula...</p>

        <h2>Seção 2: Outro Título</h2>
        <p>
          Mais conteúdo aqui, explicando os conceitos da aula de forma clara e
          didática.
        </p>
      </article>

      <footer class="navegacao-aula">
        <a href="#">&lt;&lt; Aula Anterior</a>

        <a href="#">Próxima Aula &gt;&gt;</a>
      </footer>
    </main>
  </body>
</html>
