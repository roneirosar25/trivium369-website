<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRIVIUM 369 | Aula</title>

    <link rel="stylesheet" href="../../../../style-main.css" />
  </head>
  <body>
    <div class="layout-curso-v2">
      <aside class="sidebar-navegacao">
        <h3>Navegação do Curso</h3>
      </aside>

      <main class="conteudo-aula-container">
        <div class="barra-progresso-container">
          <div class="barra-progresso-preenchimento" id="barraProgresso"></div>
          <span class="progresso-texto" id="progressoTexto">0% concluído</span>
        </div>

        <header class="aula-header">
          <h3>MÓDULO X: NOME DO MÓDULO</h3>
          <h1>Título da Aula</h1>
        </header>

        <article class="aula-content">
          <h2>Seção 1: Título da Seção</h2>
          <p>Este é um parágrafo de exemplo do conteúdo da aula...</p>
        </article>

        <footer class="navegacao-aula">
          <a href="#">&lt;&lt; Aula Anterior</a>
          <a href="#" class="cta-button" id="btnMarcarConcluida"
            >Marcar como Concluída</a
          >
          <a href="#">Próxima Aula &gt;&gt;</a>
        </footer>
      </main>

      <aside class="sidebar-ferramentas">
        <div class="ferramenta-box">
          <h4>Anotações Pessoais</h4>
          <textarea
            id="anotacoesPessoais"
            placeholder="Suas anotações sobre a aula são salvas automaticamente..."
          ></textarea>
        </div>
      </aside>
    </div>

    <div id="kairos-chat-button" title="Converse com a Kairos">
      <img src="../../../../assets/img/kairos-icon.png" alt="Ícone da Kairos" />
    </div>

    <script src="../../../../scripts/sidebar.js"></script>
    <script src="../../../../scripts/progresso.js"></script>
    <script src="../../../../scripts/anotacoes.js"></script>
    <script src="../../../../scripts/kairos-chat.js"></script>
  </body>
</html>
